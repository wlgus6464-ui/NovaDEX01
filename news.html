<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaDEX - News</title>
    <style>
        :root {
            --bg: #090B11;
            --sidebar: #0F141D;
            --panel: #141B26;
            --border: #232B38;
            --primary: #7CFF6B;
            --danger: #FF5A73;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: system-ui, sans-serif;
        }
        .glass {
            background: rgba(20,27,38,0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 18px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 24px;
            color: #aaa;
            text-decoration: none;
            transition: all 0.25s ease;
        }
        .nav-item:hover {
            color: var(--primary);
            background: rgba(124,255,107,0.12);
            transform: translateX(6px);
        }
        .nav-item.active {
            color: var(--primary);
        }

        .coin-tabs {
            display: flex;
            gap: 12px;
            margin: 30px 0 40px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .coin-tab {
            padding: 10px 24px;
            background: #1f222b;
            border-radius: 999px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.25s ease;
        }
        .coin-tab.active {
            background: var(--primary);
            color: black;
            font-weight: 600;
        }

        /* Hot Topic - 황금 효과 */
        .hot-topic {
            background: #11141f;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            cursor: pointer;
            display: flex;
            gap: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.95), 0 0 80px rgba(255, 165, 0, 0.8);
            animation: flameBorder 2.8s linear infinite;
        }
        .hot-topic::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 24px;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FF8C00, #FFD700);
            filter: blur(20px);
            opacity: 0.85;
            z-index: -1;
            animation: flameGlow 2.2s ease-in-out infinite alternate;
        }
        @keyframes flameBorder {
            0% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.95), 0 0 80px rgba(255, 165, 0, 0.8); }
            50% { box-shadow: 0 0 60px rgba(255, 215, 0, 1), 0 0 110px rgba(255, 165, 0, 0.95); }
            100% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.95), 0 0 80px rgba(255, 165, 0, 0.8); }
        }
        @keyframes flameGlow {
            from { opacity: 0.7; }
            to { opacity: 0.95; }
        }

        .hot-topic .hot-label .text {
            background: linear-gradient(90deg, #FFD700, #FFEA80, #FFD700);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: goldShimmer 2s linear infinite;
            font-size: 1.6rem;
            font-weight: 700;
        }
        @keyframes goldShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .hot-topic .title {
            font-size: 1.45rem;
            font-weight: 700;
            margin: 12px 0 8px;
            line-height: 1.4;
        }
        .hot-topic .comment {
            color: #ddd;
            line-height: 1.6;
            font-size: 1.05rem;
        }

        .related-section { margin-bottom: 40px; position: relative; z-index: 5; }
        .related-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
        }
        .related-card {
            background: #1a1f2b;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .related-card:hover {
            transform: translateY(-2px);
            background: #252b3b;
        }

        .news-card {
            background: #11141f;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        .news-card:hover {
            transform: translateY(-3px);
        }
        .news-title {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 12px;
            color: #f0f0f0;
        }
        .news-meta {
            font-size: 0.9rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="glass" style="width:260px; position:fixed; height:100vh; background:var(--sidebar); padding:24px 0; border-right:1px solid #333; z-index: 10;">
        <div style="padding:0 24px 40px; font-size:28px; font-weight:700; color:var(--primary);">🌟 NovaDEX</div>
        <nav>
            <a href="index.html" class="nav-item">🌟 <span>Top</span></a>
            <a href="trending.html" class="nav-item">🔥 <span>Trending</span></a>
            <a href="#" class="nav-item">🌱 <span>Most Visited</span></a>
            <a href="#" class="nav-item">💰 <span>Prediction Markets</span></a>
            <a href="news.html" class="nav-item active">📰 <span>News</span></a>
            <a href="#" class="nav-item">📊 <span>On-Chain Data</span></a>
        </nav>
    </aside>

    <main style="margin-left:260px; padding:40px;">
        <!-- Hot Topic -->
        <div id="hot-topic-container" class="glass hot-topic" style="display:none;">
            <div class="text-area">
                <div class="hot-label">
                    <span class="exclamation">‼️</span>
                    <span class="text">HOT TOPIC</span>
                    <span class="exclamation">‼️</span>
                </div>
                <div class="title" id="hot-title"></div>
                <div class="comment" id="hot-comment"></div>
            </div>
            <div class="image-area">
                <img id="hot-image" src="" alt="Hot Topic">
            </div>
        </div>

        <!-- Related Articles -->
        <div id="related-section" class="related-section" style="display:none;">
            <div class="related-title">↓ Related Articles</div>
            <div id="related-container"></div>
        </div>

        <!-- Crypto News -->
        <h1 style="margin-bottom:20px;">📰 Crypto News</h1>

        <!-- Coin Tabs -->
        <div class="coin-tabs">
            <div class="coin-tab active" data-filter="BTC">BTC</div>
            <div class="coin-tab" data-filter="ETH">ETH</div>
            <div class="coin-tab" data-filter="XRP">XRP</div>
            <div class="coin-tab" data-filter="SHIB">SHIB</div>
            <div class="coin-tab" data-filter="BTT">BTT</div>
            <div class="coin-tab" data-filter="ETC">ETC</div>
            <div class="coin-tab" data-filter="ALT">ALT</div>
        </div>

        <div id="news-container"></div>
    </main>

    <script src="trendingData.js"></script>
    <script>
        function renderHotTopic(filter) {
            const hot = window.coinHotTopics[filter];
            const container = document.getElementById('hot-topic-container');
            const relatedSection = document.getElementById('related-section');

            if (hot) {
                container.style.display = 'flex';
                relatedSection.style.display = 'block';
                document.getElementById('hot-title').textContent = hot.title;
                document.getElementById('hot-comment').textContent = hot.comment || '';
                document.getElementById('hot-image').src = hot.img || 'https://picsum.photos/id/1015/260/160';
                container.onclick = () => window.open(hot.link || '#', '_blank');
            } else {
                container.style.display = 'none';
                relatedSection.style.display = 'none';
            }
        }

        function renderRelatedArticles(filter) {
            const relatedContainer = document.getElementById('related-container');
            relatedContainer.innerHTML = '';

            const related = window.coinRelatedArticles[filter] || [];
            if (related.length > 0) {
                const r = related[0];
                const card = document.createElement('div');
                card.className = 'related-card glass';
                card.innerHTML = `<div class="news-title">${r.title}</div>`;
                card.onclick = () => window.open(r.link, '_blank');
                relatedContainer.appendChild(card);
            }
        }

        function renderManualNews(filter) {
            const container = document.getElementById('news-container');
            container.innerHTML = '';

            const manual = window.manualNews[filter] || [];
            manual.forEach(news => {
                const card = document.createElement('div');
                card.className = 'glass news-card';
                card.innerHTML = `
                    <div class="news-title">${news.title}</div>
                    <div class="news-meta">
                        <span>${news.time || '2 hours ago'}</span>
                    </div>
                `;
                card.onclick = () => window.open(news.link, '_blank');
                container.appendChild(card);
            });

            if (manual.length === 0) {
                container.innerHTML = `<div style="padding:40px; color:#888; text-align:center;">이 코인에 대한 뉴스가 아직 등록되지 않았습니다.</div>`;
            }
        }

        document.querySelectorAll('.coin-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.coin-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const filter = tab.getAttribute('data-filter');
                renderHotTopic(filter);
                renderRelatedArticles(filter);
                renderManualNews(filter);
            });
        });

        // 초기 로드
        renderHotTopic('BTC');
        renderRelatedArticles('BTC');
        renderManualNews('BTC');
    </script>
</body>
</html>
