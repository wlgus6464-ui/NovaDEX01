<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaDEX - Trending</title>
    <style>
        :root {
            --bg: #090B11;
            --sidebar: #0F141D;
            --panel: #141B26;
            --border: #232B38;
            --primary: #7CFF6B;
            --danger: #FF5A73;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: system-ui, sans-serif;
        }
        .glass {
            background: rgba(20,27,38,0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 18px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 24px;
            color: #aaa;
            text-decoration: none;
            transition: all 0.25s ease;
        }
        .nav-item:hover {
            color: var(--primary);
            background: rgba(124,255,107,0.12);
            transform: translateX(6px);
        }
        .nav-item.active {
            color: var(--primary);
        }
        .pool-card {
            background: #11141f;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 40px;
        }
        .card-content {
            display: flex;
            gap: 30px;
        }
        .card-left {
            flex: 1;
        }
        .card-right {
            flex: 1;
        }
        .coin-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 50%;
            margin-bottom: 16px;
        }
        .banner-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .banner-text {
            background: rgba(255,255,255,0.08);
            color: #ddd;
            padding: 18px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .progress-bar-container {
            margin: 12px 0;
            height: 10px;
            background: #1f222b;
            border-radius: 999px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            border-radius: 999px;
            transition: width 1.2s ease-in-out;
            position: relative;
        }
        .progress-bar.end {
            background: var(--primary);
            width: 100%;
        }
        .progress-bar.ongoing {
            background: linear-gradient(90deg, #FFD700, #FFA500, #FFD700);
            background-size: 200% 100%;
            animation: goldShimmer 1.2s linear infinite;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        .progress-bar.ongoing::after {
            content: '';
            position: absolute;
            right: -2px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 12px #fff, 0 0 24px #FFD700, 0 0 40px #FFA500;
            animation: tipGlow 1.5s ease-in-out infinite;
            z-index: 5;
        }
        @keyframes goldShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        @keyframes tipGlow {
            0%, 100% {
                box-shadow: 0 0 12px #fff, 0 0 24px #FFD700, 0 0 40px #FFA500;
                transform: translateY(-50%) scale(1);
            }
            50% {
                box-shadow: 0 0 20px #fff, 0 0 36px #FFD700, 0 0 60px #FFA500;
                transform: translateY(-50%) scale(1.15);
            }
        }
        .countdown {
            display: flex;
            gap: 12px;
            margin: 20px 0 30px;
        }
        .countdown-box {
            background: #1f222b;
            padding: 12px 16px;
            border-radius: 8px;
            text-align: center;
            min-width: 60px;
        }
        .countdown-box .number {
            font-size: 1.5rem;
            font-weight: 700;
        }
        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: black;
            border: none;
            border-radius: 999px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        button:hover {
            transform: scale(1.02);
        }
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .card-content {
                flex-direction: column;
            }
            .card-right {
                order: -1;
            }
            .banner-image {
                height: 180px;
            }
            .banner-text {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="glass" style="width:260px; position:fixed; height:100vh; background:var(--sidebar); padding:24px 0; border-right:1px solid #333;">
        <div style="padding:0 24px 40px; font-size:28px; font-weight:700; color:var(--primary);">🌟 NovaDEX</div>
        <nav>
            <a href="index.html" class="nav-item">🌟 <span>Top</span></a>
            <a href="trending.html" class="nav-item active">🔥 <span>Trending</span></a>
            <a href="#" class="nav-item">🌱 <span>Most Visited</span></a>
            <a href="#" class="nav-item">💰 <span>Prediction Markets</span></a>
            <a href="news.html" class="nav-item">📰 <span>News</span></a>
            <a href="#" class="nav-item">📊 <span>On-Chain Data</span></a>
        </nav>
    </aside>
    <main style="margin-left:260px; padding:40px;">
        <h1 style="margin-bottom:40px;">🔥 Trending</h1>
        <div id="trending-cards"></div>
    </main>
    <script src="trendingData.js"></script>
    <script>
        const container = document.getElementById('trending-cards');
        function getDateColor(dateStr) {
            const targetDate = new Date(dateStr);
            const now = new Date();
            return targetDate < now ? 'var(--danger)' : '#7CFF6B';
        }
        trendingData.forEach((item, index) => {
            const endTime = new Date(item.endDate).getTime();
            let isEnded = endTime < Date.now();
            if (item.title === "Algoland (ALGO)") {
                isEnded = false;
            }
            const card = document.createElement('div');
            card.className = 'pool-card glass';
            card.innerHTML = `
                <div class="card-content">
                    <div class="card-left">
                        <div style="display:flex; align-items:center; gap:16px; margin-bottom:16px;">
                            <img src="${item.img}" class="coin-logo" alt="${item.title}">
                            <div>
                                <div style="font-size:1.8rem; font-weight:700;">${item.title}</div>
                                <div style="color:${isEnded ? 'var(--danger)' : '#7CFF6B'}; font-size:1rem; font-weight:600;">
                                    ${isEnded ? 'END' : 'Ongoing'}
                                </div>
                            </div>
                        </div>
                        <div style="margin-bottom:20px;">
                            <div style="color:#aaa;">Upward Prediction</div>
                            <div style="font-size:2.4rem; font-weight:700; color:var(--primary);">${item.prediction}</div>
                            <div style="color:#aaa;">≈ ${item.price} USDT</div>
                        </div>
                        <div style="margin-bottom:12px; line-height:1.6;">
                            <div style="color:#aaa; font-size:0.95rem;">
                                Start In <span style="color:${getDateColor(item.startDate)};">${item.startDate.split('T')[0]}</span>
                            </div>
                            <div style="color:#aaa; font-size:0.95rem;">
                                Ends In <span style="color:${getDateColor(item.endDate)};">${item.endDate.split('T')[0]}</span>
                            </div>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar ${isEnded ? 'end' : 'ongoing'}" id="progress-${index}"></div>
                        </div>
                        <div class="countdown" id="countdown${index}">
                            <div class="countdown-box"><span class="number">0</span><div>D</div></div>
                            <div class="countdown-box"><span class="number">0</span><div>H</div></div>
                            <div class="countdown-box"><span class="number">0</span><div>M</div></div>
                            <div class="countdown-box"><span class="number">0</span><div>S</div></div>
                        </div>
                        <button onclick="window.open('${item.participateLink}', '_blank')">Participate</button>
                    </div>
                    <div class="card-right">
                        <img src="${item.bannerImage}" class="banner-image" alt="Banner">
                        <div class="banner-text">${item.bannerText}</div>
                    </div>
                </div>
            `;
            container.appendChild(card);
            const progressBar = document.getElementById(`progress-${index}`);
            if (isEnded) {
                progressBar.style.width = '100%';
            } else {
                progressBar.style.width = '70%';
                setInterval(() => {
                    const randomWidth = 70 + Math.random() * 3.5;
                    progressBar.style.width = `${randomWidth}%`;
                }, 1200);
            }
            startCountdown(`countdown${index}`, item.endDate);
        });
        function startCountdown(id, endTimeStr) {
            const endTime = new Date(endTimeStr).getTime();
            setInterval(() => {
                const now = new Date().getTime();
                let distance = endTime - now;
                if (distance < 0) distance = 0;
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                document.getElementById(id).innerHTML = `
                    <div class="countdown-box"><span class="number">${days}</span><div>D</div></div>
                    <div class="countdown-box"><span class="number">${hours}</span><div>H</div></div>
                    <div class="countdown-box"><span class="number">${minutes}</span><div>M</div></div>
                    <div class="countdown-box"><span class="number">${seconds}</span><div>S</div></div>
                `;
            }, 1000);
        }
        setInterval(() => {
            const cards = document.querySelectorAll('.pool-card');
            cards.forEach((card, idx) => {
                const item = trendingData[idx];
                if (!item) return;
                const startSpan = card.querySelector('.card-left > div:nth-child(3) > div:first-child span');
                const endSpan = card.querySelector('.card-left > div:nth-child(3) > div:last-child span');
                if (startSpan) startSpan.style.color = getDateColor(item.startDate);
                if (endSpan) endSpan.style.color = getDateColor(item.endDate);
            });
        }, 60000);
    </script>
</body>
</html>
